<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Mini | Produk Terlaris Shopee</title>
    <style>
        :root { --shopee-orange: #ee4d2d; --bg-color: #f7f7f7; --text-dark: #333; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        
        /* HEADER RAPI */
        header { background: var(--shopee-orange); text-align: center; padding: 20px 15px; }
        .header-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .logo-gif { height: 60px; width: 60px; border-radius: 12px; border: 2px solid white; object-fit: cover; }
        /* Mengatur agar teks tidak bertumpuk */
        header h1 { margin: 0; color: white; font-size: 20px; font-weight: 800; line-height: 1.2; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        header p { margin: 0; color: #fff8f5; font-size: 0.85em; opacity: 0.9; line-height: 1.4; }

        /* TAB NAV DENGAN HINT */
        .nav-wrapper { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .scroll-hint { font-size: 10px; color: #999; text-align: center; padding: 4px 0; background: #fff; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #eee; }
        .tab-nav { display: flex; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding: 0 10px; }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 12px 16px; border: none; background: none; cursor: pointer; font-weight: 600; color: #777; white-space: nowrap; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--shopee-orange); border-bottom: 3px solid var(--shopee-orange); }

        /* GRID */
        .container { max-width: 1100px; margin: 15px auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .content { padding: 8px; }
        .title { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; height: 35px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .sold-info { font-size: 0.75em; color: #ff4500; font-weight: bold; margin-bottom: 8px; }
        .btn-shopee { display: block; text-align: center; background-color: var(--shopee-orange); color: white; text-decoration: none; padding: 8px; border-radius: 4px; font-weight: bold; font-size: 0.8em; }

        /* FOOTER */
        footer { text-align: center; padding: 20px; color: #999; font-size: 0.75em; background: #f7f7f7; }
    </style>
</head>
<body>

<header>
    <div class="header-wrapper">
        <img src="logoweb.gif" alt="Logo" class="logo-gif">
        <div>
            <h1>SHOPEE PRODUK TERLARIS</h1>
            <p>Pilihan terbaik khusus untuk anda</p>
        </div>
    </div>
</header>

<div class="nav-wrapper">
    <div class="scroll-hint">← Geser untuk kategori lain →</div>
    <div class="tab-nav" id="tabNav"></div>
</div>

<div class="container" id="productGrid"></div>

<footer>
    <p>&copy; 2026 STUDIOMINI Affiliate. Semua produk diarahkan ke Shopee Indonesia.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
