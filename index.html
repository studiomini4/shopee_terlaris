<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Mini | Produk Terlaris Shopee</title>
    <style>
        /* ... (CSS Anda tetap sama seperti sebelumnya) ... */
        :root { --shopee-orange: #ee4d2d; --bg-color: #f7f7f7; --text-dark: #333; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        header { background: var(--shopee-orange); text-align: center; padding: 30px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .logo-gif { height: 55px; width: auto; border-radius: 10px; border: 2px solid white; }
        header h1 { margin: 0; color: var(--shopee-orange); letter-spacing: -1px; text-transform: uppercase; font-size: 32px; font-weight: 900; text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0px 3px 10px rgba(0,0,0,0.2); }
        header p { margin: 10px 0 0; color: white; font-size: 0.95em; font-weight: 600; letter-spacing: 0.5px; }
        .tab-nav { display: flex; justify-content: center; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-x: auto; }
        .tab-btn { padding: 15px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: #777; white-space: nowrap; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--shopee-orange); border-bottom: 3px solid var(--shopee-orange); }
        .container { max-width: 1000px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 0 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.95em; font-weight: bold; margin-bottom: 5px; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .sold-info { font-size: 0.8em; color: #ff4500; font-weight: bold; margin-bottom: 10px; }
        .btn-shopee { text-align: center; background-color: var(--shopee-orange); color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 0.85em; margin-top: auto; }
        footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.8em; }
        @media (max-width: 480px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px; }
            .card img { height: 150px; }
            header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logoweb.gif" alt="Logo Studio Mini" class="logo-gif">
        <h1>SHOPEE PRODUK TERLARIS </h1>
    </div>
    <p>Selamat datang di website kami, ini adalah produk terlaris dari shopee untuk anda.</p>
</header>

<div class="tab-nav" id="tabNav"></div>

<div class="container" id="productGrid"></div>

<footer>
    <p>&copy; 2026 STUDIOMINI Affiliate. Semua produk diarahkan ke Shopee Indonesia.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
